name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & format check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  # ─────────────────────────────────────────────────────────────────────────
  # Type checking
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run mypy
        run: uv run mypy src/

  # ─────────────────────────────────────────────────────────────────────────
  # Tests — matrix: Python 3.11 / 3.12 / 3.13 × Ubuntu
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run unit + integration tests (coverage gate)
        run: >
          uv run pytest tests/unit/ tests/integration/ -v --tb=short
          --cov=job_sentinel --cov-report=term-missing --cov-fail-under=80
        env:
          # Provide dummy values so settings validation passes in tests
          TELEGRAM_BOT_TOKEN: "test:AAAAAAAAA"
          TELEGRAM_CHAT_ID: "12345678"
          PORTAL_USERNAME: "testuser"
          PORTAL_PASSWORD: "testpass"
          PORTAL_JOBS_URL: "https://example.com"
          DRY_RUN: "true"

  # ─────────────────────────────────────────────────────────────────────────
  # Security — scan for secrets
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history for gitleaks

      - name: Install gitleaks
        run: |
          v=8.21.2
          base=https://github.com/gitleaks/gitleaks/releases/download
          curl -sSL "$base/v$v/gitleaks_${v}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --no-banner --verbose

  # ─────────────────────────────────────────────────────────────────────────
  # Supply chain — dependency vulnerabilities + license compliance
  # ─────────────────────────────────────────────────────────────────────────
  supply-chain:
    name: Supply Chain (audit + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Audit dependencies for known vulnerabilities
        # CVE-2025-46656: markdownify 0.13.x — pulled in only by the optional
        # `sources` extra (the opt-in JobSpy scraper), which hard-pins
        # markdownify>=0.13.1,<0.14.0, so the 0.14.1 fix is unreachable until
        # JobSpy relaxes its pin. The dep is lazy-imported, never installed for
        # default users, and only converts job-description HTML locally — low
        # risk. Revisit when JobSpy bumps the pin.
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2025-46656

      - name: Check dependency license compliance
        run: uv run python scripts/check_licenses.py

  # ─────────────────────────────────────────────────────────────────────────
  # Web UI — type-check + production build
  # ─────────────────────────────────────────────────────────────────────────
  web:
    name: Web (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
