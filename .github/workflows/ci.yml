name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & format check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  # ─────────────────────────────────────────────────────────────────────────
  # Type checking
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/

  # ─────────────────────────────────────────────────────────────────────────
  # Tests — matrix: Python 3.11 + 3.12 × Ubuntu
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit + integration tests
        run: uv run pytest tests/unit/ tests/integration/ -v --tb=short
        env:
          # Provide dummy values so settings validation passes in tests
          TELEGRAM_BOT_TOKEN: "test:AAAAAAAAA"
          TELEGRAM_CHAT_ID: "12345678"
          PORTAL_USERNAME: "testuser"
          PORTAL_PASSWORD: "testpass"
          PORTAL_JOBS_URL: "https://example.com"
          DRY_RUN: "true"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Security — scan for secrets
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for gitleaks

      - name: Install gitleaks
        run: |
          v=8.21.2
          base=https://github.com/gitleaks/gitleaks/releases/download
          curl -sSL "$base/v$v/gitleaks_${v}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --no-banner --verbose
