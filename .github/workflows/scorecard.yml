name: OpenSSF Scorecard

# Continuous supply-chain / security-posture measurement.
# Results appear at https://securityscorecards.dev/viewer/?uri=github.com/harshitwandhare/job-sentinel
on:
  schedule:
    - cron: "30 4 * * 1" # weekly, Monday 04:30 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write        # publish results (signed)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        # scorecard-action publishes no floating major tag — pin the release
        # (Dependabot's github-actions ecosystem keeps this current).
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
