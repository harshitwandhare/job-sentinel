name: Release

# Cut a release by pushing a SemVer tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    # Copy the secret to job env so it can be referenced in step `if:` conditions
    # (the `secrets` context isn't allowed directly in `if`).
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Build sdist + wheel
        run: uv build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          dist/*
          --title "${{ github.ref_name }}"
          --notes "Automated release for ${{ github.ref_name }}. See CHANGELOG.md for details."

      # Publishes to PyPI only when the PYPI_API_TOKEN secret is configured;
      # otherwise this step is skipped and the GitHub Release still succeeds.
      - name: Publish to PyPI
        if: ${{ env.PYPI_TOKEN != '' }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
