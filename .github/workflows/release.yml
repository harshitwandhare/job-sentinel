name: Release

# Cut a release by pushing a SemVer tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the GitHub Release
    # Copy the secret to job env so it can be referenced in step `if:` conditions
    # (the `secrets` context isn't allowed directly in `if`).
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Build sdist + wheel
        run: uv build

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section for this version: lines between "## [x.y.z]" and the
          # next "## [" heading. Uses index() (literal, no regex escaping) so it
          # behaves the same across awk implementations. Falls back to a generic
          # note if the section isn't found.
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md | sed '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $GITHUB_REF_NAME. See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          dist/*
          --title "${{ github.ref_name }}"
          --notes-file RELEASE_NOTES.md

      # Publishes to PyPI only when the PYPI_API_TOKEN secret is configured;
      # otherwise this step is skipped and the GitHub Release still succeeds.
      - name: Publish to PyPI
        if: ${{ env.PYPI_TOKEN != '' }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
