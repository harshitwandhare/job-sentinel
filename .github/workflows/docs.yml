name: Docs

# Build and publish the MkDocs site to GitHub Pages on every docs change.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy site
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh-deploy pushes to the gh-pages branch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # git-revision-date plugin reads history

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install docs dependencies
        run: uv sync --locked --extra docs

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
